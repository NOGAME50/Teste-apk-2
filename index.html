<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NOGAME TECH</title>
    <style>
        /* [Gade tout style yo menm jan anvan] */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        #root {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Splash Screen */
        .splash-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: #000;
        }

        .logo {
            width: 100px;
            height: 100px;
            background: #25D366;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 30px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: #25D366;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-secondary {
            background: #ff0050;
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 12px;
            width: auto;
            display: inline-block;
            margin: 5px;
        }

        .btn-danger {
            background: #ff3333;
        }

        .auth-form {
            width: 100%;
            max-width: 350px;
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
        }

        .link {
            color: #25D366;
            text-align: center;
            display: block;
            margin-top: 15px;
            text-decoration: none;
        }

        /* Main App */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 70px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a1a;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            border-top: 1px solid #333;
            z-index: 1000;
        }

        .bottom-nav a {
            color: #888;
            text-decoration: none;
            font-size: 24px;
            padding: 5px 15px;
            position: relative;
        }

        .bottom-nav a.active {
            color: #25D366;
        }

        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff0050;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Photo Feed (olye video) */
        .photo-feed {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }

        .photo-container {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background: #111;
        }

        .photo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-info {
            position: absolute;
            bottom: 100px;
            left: 20px;
            right: 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #25D366;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid white;
            overflow: hidden;
            cursor: pointer;
            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .username {
            font-weight: bold;
            cursor: pointer;
        }

        .verified-badge {
            background: #3897f0;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .follow-btn {
            background: #ff0050;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .follow-btn.following {
            background: #25D366;
        }

        .photo-actions {
            position: absolute;
            right: 15px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .photo-actions button {
            background: rgba(0,0,0,0.7);
            border: none;
            color: white;
            font-size: 24px;
            padding: 8px;
            border-radius: 30px;
            min-width: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .photo-actions button span {
            font-size: 12px;
        }

        .photo-actions button.liked {
            color: #ff0050;
        }

        /* Comments */
        .comments-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            overflow-y: auto;
            padding: 20px;
        }

        .comments-list {
            margin-bottom: 20px;
        }

        .comment-item {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 10px;
        }

        .comment-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #25D366;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid white;
            overflow: hidden;
            flex-shrink: 0;
        }

        .comment-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .comment-content {
            flex: 1;
        }

        .comment-user {
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 5px;
        }

        .comment-text {
            color: #ddd;
            margin-bottom: 5px;
        }

        .comment-time {
            font-size: 10px;
            color: #888;
        }

        .reply-btn {
            color: #25D366;
            font-size: 12px;
            margin-top: 5px;
            cursor: pointer;
        }

        .reply-item {
            margin-left: 50px;
            margin-top: 10px;
            padding: 8px;
            background: #2a2a2a;
            border-radius: 8px;
        }

        .comment-input-area {
            display: flex;
            gap: 10px;
            position: sticky;
            bottom: 0;
            background: #000;
            padding: 10px;
        }

        .comment-input-area input {
            flex: 1;
            padding: 12px;
            background: #1a1a1a;
            border: none;
            border-radius: 20px;
            color: white;
        }

        .comment-input-area button {
            padding: 12px 20px;
            background: #25D366;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        /* Chat */
        .chat-header {
            background: #075E54;
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .chat-tabs {
            display: flex;
            background: #075E54;
            padding: 0 15px;
            overflow-x: auto;
            gap: 5px;
        }

        .tab {
            flex: 0 0 auto;
            padding: 12px 20px;
            background: none;
            border: none;
            color: white;
            opacity: 0.7;
            cursor: pointer;
            border-radius: 20px 20px 0 0;
        }

        .tab.active {
            opacity: 1;
            background: rgba(255,255,255,0.1);
        }

        .group-item, .channel-item, .chat-item, .request-item {
            display: flex;
            padding: 15px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            align-items: center;
        }

        .group-item:hover, .channel-item:hover, .chat-item:hover, .request-item:hover {
            background: #1a1a1a;
        }

        .group-icon, .channel-icon {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            background: linear-gradient(135deg, #25D366, #ff0050);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .group-icon.owner, .channel-icon.owner {
            background: linear-gradient(135deg, gold, orange);
        }

        .group-info, .channel-info, .chat-info {
            flex: 1;
        }

        .group-info h4, .channel-info h4, .chat-info h4 {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }

        .group-info p, .channel-info p, .chat-info p {
            color: #888;
            font-size: 13px;
        }

        .owner-badge {
            background: gold;
            color: black;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
        }

        .admin-badge {
            background: #25D366;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
        }

        .unread {
            background: #25D366;
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 12px;
            margin-left: 10px;
        }

        .accept-btn, .reject-btn, .admin-btn, .remove-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 5px;
        }

        .accept-btn {
            background: #25D366;
            color: white;
        }

        .reject-btn, .remove-btn {
            background: #ff0050;
            color: white;
        }

        .admin-btn {
            background: gold;
            color: black;
        }

        /* Chat Window */
        .chat-window {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 1500;
            display: none;
            flex-direction: column;
        }

        .chat-window.active {
            display: flex;
        }

        .chat-window-header {
            background: #075E54;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
        }

        .header-info {
            flex: 1;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .header-actions span {
            font-size: 20px;
            cursor: pointer;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 20px;
            word-wrap: break-word;
            position: relative;
        }

        .message.sent {
            align-self: flex-end;
            background: #25D366;
        }

        .message.received {
            align-self: flex-start;
            background: #1a1a1a;
        }

        .message.owner-message {
            background: linear-gradient(135deg, gold, orange);
            color: black;
        }

        .message-image {
            max-width: 200px;
            border-radius: 10px;
            margin-top: 5px;
            cursor: pointer;
        }

        .reply-indicator {
            font-size: 11px;
            color: #888;
            margin-bottom: 5px;
            padding: 3px 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            display: inline-block;
        }

        .reply-message-btn {
            color: #25D366;
            font-size: 11px;
            margin-left: 10px;
            cursor: pointer;
            opacity: 0.7;
        }

        .reply-message-btn:hover {
            opacity: 1;
        }

        .chat-input-area {
            display: flex;
            padding: 15px;
            gap: 10px;
            background: #1a1a1a;
            flex-wrap: wrap;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            border-radius: 25px;
            color: white;
            min-width: 200px;
        }

        .chat-input-area input:disabled {
            opacity: 0.5;
        }

        .chat-input-area button {
            padding: 12px 25px;
            background: #25D366;
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
        }

        .chat-input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .attach-btn {
            background: #ff0050 !important;
        }

        .cancel-reply {
            background: #ff0050 !important;
            padding: 12px 15px !important;
        }

        /* Profile */
        .profile-header {
            background: linear-gradient(to bottom, #075E54, #128C7E);
            padding: 20px;
        }

        .cover-photo {
            height: 150px;
            background: #1a1a1a;
            border-radius: 10px;
            margin-bottom: 50px;
            position: relative;
            overflow: hidden;
        }

        .cover-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cover-edit {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
        }

        .profile-pic-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin-top: -50px;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #25D366;
            border: 4px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            overflow: hidden;
            cursor: pointer;
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px 0;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
        }

        .stats div {
            text-align: center;
            cursor: pointer;
        }

        .stats strong {
            display: block;
            font-size: 20px;
            color: #25D366;
        }

        .bio {
            margin: 20px 0;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 10px;
        }

        .edit-profile-form {
            padding: 20px;
            background: #1a1a1a;
            margin: 20px;
            border-radius: 15px;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            padding: 15px;
        }

        .photo-grid-item {
            aspect-ratio: 1/1;
            background: #1a1a1a;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .photo-grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .delete-photo {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ff0050;
            color: white;
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
        }

        .photo-badge {
            position: absolute;
            bottom: 5px;
            left: 5px;
            background: rgba(0,0,0,0.7);
            color: #25D366;
            padding: 3px 8px;
            border-radius: 15px;
            font-size: 10px;
            font-weight: bold;
            z-index: 10;
        }

        /* Bouton son (gardé pour compatibilité) */
        .sound-btn {
            background: rgba(0,0,0,0.7) !important;
            color: white !important;
            font-size: 20px !important;
            min-width: 50px !important;
        }

        .sound-btn:hover {
            background: #25D366 !important;
        }

        /* Search */
        .search-bar {
            padding: 15px;
            display: flex;
            gap: 10px;
            background: #1a1a1a;
            position: sticky;
            top: 0;
        }

        .search-bar input {
            flex: 1;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            border-radius: 25px;
            color: white;
        }

        .search-bar button {
            width: 50px;
            background: #000;
            border: 1px solid #333;
            border-radius: 25px;
            color: white;
            cursor: pointer;
        }

        /* Upload */
        .upload-area {
            background: #1a1a1a;
            border: 2px dashed #25D366;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            margin: 20px;
            cursor: pointer;
        }

        .upload-preview img {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            margin: 20px 0;
            border-radius: 10px;
        }

        .upload-form {
            padding: 20px;
        }

        .upload-form input, .upload-form textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #25D366;
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            z-index: 10000;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { transform: translate(-50%, -100%); }
            to { transform: translate(-50%, 0); }
        }

        /* Group Management */
        .group-management {
            padding: 20px;
            overflow-y: auto;
            height: 100%;
        }

        .member-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .member-info {
            flex: 1;
            margin-left: 10px;
        }

        .member-role {
            font-size: 11px;
            color: #888;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // ==================== CONFIGURATION ====================
        const STORAGE_KEYS = {
            USERS: 'ng_users',
            CURRENT_USER: 'ng_current_user',
            POSTS: 'ng_posts',
            COMMENTS: 'ng_comments',
            MESSAGES: 'ng_messages',
            FRIEND_REQUESTS: 'ng_requests',
            FOLLOWING: 'ng_following',
            NOTIFICATIONS: 'ng_notifications',
            UNREAD: 'ng_unread',
            GROUPS: 'ng_groups',
            CHANNELS: 'ng_channels',
            GROUP_ADMINS: 'ng_group_admins',
            CHANNEL_ADMINS: 'ng_channel_admins'
        };

        const OWNER = {
            username: 'nogame_owner',
            email: 'owner@nogame.tech',
            password: 'owner123',
            bio: 'Créateur de NOGAME TECH',
            country: 'HT'
        };

        // ==================== INITIALISATION ====================
        function initData() {
            if (!localStorage.getItem(STORAGE_KEYS.USERS)) {
                const owner = {
                    id: 'owner_' + Date.now(),
                    username: OWNER.username,
                    email: OWNER.email,
                    password: OWNER.password,
                    bio: OWNER.bio,
                    country: OWNER.country,
                    profilePic: '👑',
                    coverPic: null,
                    followers: [],
                    following: [],
                    friends: [],
                    verified: true,
                    isOwner: true,
                    createdAt: new Date().toISOString()
                };
                localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify([owner]));
            }

            if (!localStorage.getItem(STORAGE_KEYS.POSTS)) {
                localStorage.setItem(STORAGE_KEYS.POSTS, JSON.stringify([]));
            }

            if (!localStorage.getItem(STORAGE_KEYS.COMMENTS)) {
                localStorage.setItem(STORAGE_KEYS.COMMENTS, JSON.stringify({}));
            }

            if (!localStorage.getItem(STORAGE_KEYS.MESSAGES)) {
                localStorage.setItem(STORAGE_KEYS.MESSAGES, JSON.stringify({}));
            }

            if (!localStorage.getItem(STORAGE_KEYS.FRIEND_REQUESTS)) {
                localStorage.setItem(STORAGE_KEYS.FRIEND_REQUESTS, JSON.stringify({}));
            }

            if (!localStorage.getItem(STORAGE_KEYS.FOLLOWING)) {
                localStorage.setItem(STORAGE_KEYS.FOLLOWING, JSON.stringify({}));
            }

            if (!localStorage.getItem(STORAGE_KEYS.NOTIFICATIONS)) {
                localStorage.setItem(STORAGE_KEYS.NOTIFICATIONS, JSON.stringify({}));
            }

            if (!localStorage.getItem(STORAGE_KEYS.UNREAD)) {
                localStorage.setItem(STORAGE_KEYS.UNREAD, JSON.stringify({}));
            }

            // Groupes
            if (!localStorage.getItem(STORAGE_KEYS.GROUPS)) {
                const ownerGroup = {
                    id: 'group_owner_' + Date.now(),
                    name: '📢 NOGAME TECH Officiel',
                    description: 'Groupe officiel - Seul le propriétaire peut écrire',
                    createdBy: 'owner_' + Date.now(),
                    isOwnerGroup: true,
                    members: [],
                    messages: [],
                    createdAt: new Date().toISOString()
                };
                localStorage.setItem(STORAGE_KEYS.GROUPS, JSON.stringify([ownerGroup]));
            }

            // Chaînes
            if (!localStorage.getItem(STORAGE_KEYS.CHANNELS)) {
                const ownerChannel = {
                    id: 'channel_owner_' + Date.now(),
                    name: '📣 NOGAME TECH Info',
                    description: 'Chaîne officielle - Seul le propriétaire peut écrire',
                    createdBy: 'owner_' + Date.now(),
                    isOwnerChannel: true,
                    subscribers: [],
                    messages: [],
                    createdAt: new Date().toISOString()
                };
                localStorage.setItem(STORAGE_KEYS.CHANNELS, JSON.stringify([ownerChannel]));
            }

            if (!localStorage.getItem(STORAGE_KEYS.GROUP_ADMINS)) {
                localStorage.setItem(STORAGE_KEYS.GROUP_ADMINS, JSON.stringify({}));
            }

            if (!localStorage.getItem(STORAGE_KEYS.CHANNEL_ADMINS)) {
                localStorage.setItem(STORAGE_KEYS.CHANNEL_ADMINS, JSON.stringify({}));
            }
        }

        // ==================== FONCTIONS UTILITAIRES ====================
        function showNotification(msg, type = 'info') {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        // ==================== GESTION DES ABONNEMENTS ====================
        function followUser(currentUserId, targetUserId) {
            const users = getUsers();
            const currentUser = users.find(u => u.id === currentUserId);
            const targetUser = users.find(u => u.id === targetUserId);

            if (!currentUser || !targetUser) return false;

            if (!currentUser.following) currentUser.following = [];
            if (!targetUser.followers) targetUser.followers = [];

            if (currentUser.following.includes(targetUserId)) {
                currentUser.following = currentUser.following.filter(id => id !== targetUserId);
                targetUser.followers = targetUser.followers.filter(id => id !== currentUserId);
                showNotification(`Vous ne suivez plus @${targetUser.username}`);
            } else {
                currentUser.following.push(targetUserId);
                targetUser.followers.push(currentUserId);
                showNotification(`Vous suivez maintenant @${targetUser.username}`);

                const notifications = JSON.parse(localStorage.getItem(STORAGE_KEYS.NOTIFICATIONS)) || {};
                if (!notifications[targetUserId]) notifications[targetUserId] = [];
                notifications[targetUserId].push({
                    type: 'new_follower',
                    from: currentUserId,
                    time: new Date().toISOString()
                });
                localStorage.setItem(STORAGE_KEYS.NOTIFICATIONS, JSON.stringify(notifications));
            }

            if (targetUser.followers.length >= 10000 && !targetUser.verified && !targetUser.isOwner) {
                targetUser.verified = true;
                showNotification(`@${targetUser.username} est maintenant vérifié!`);
            }

            saveUsers(users);
            setCurrentUser(users.find(u => u.id === currentUserId));
            return true;
        }

        function isFollowing(currentUserId, targetUserId) {
            const users = getUsers();
            const currentUser = users.find(u => u.id === currentUserId);
            return currentUser && currentUser.following ? currentUser.following.includes(targetUserId) : false;
        }

        // Nouvelle fonction pou ajoute foto
        function addPost(userId, imageFile, caption, hashtags) {
            return new Promise((resolve) => {
                const posts = getPosts();
                
                // Limite 20 photos pa itilizatè
                const userPosts = posts.filter(p => p.userId === userId);
                if (userPosts.length >= 20) {
                    showNotification('❌ Vous avez déjà 20 photos! Supprimez-en pour en ajouter une nouvelle.', 'error');
                    resolve(null);
                    return;
                }
                
                // Li foto a
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imageData = e.target.result;
                    
                    // Nouvo post ak foto
                    const newPost = {
                        id: 'post_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8),
                        userId: userId,
                        type: 'image',
                        imageData: imageData,
                        caption: caption || '',
                        hashtags: hashtags || '',
                        likes: [],
                        favorites: [],
                        comments: [],
                        shares: 0,
                        createdAt: new Date().toISOString()
                    };
                    
                    posts.push(newPost);
                    
                    try {
                        savePosts(posts);
                        
                        // Notify followers
                        const users = getUsers();
                        const user = users.find(u => u.id === userId);
                        if (user && user.followers) {
                            const notifications = JSON.parse(localStorage.getItem(STORAGE_KEYS.NOTIFICATIONS)) || {};
                            user.followers.forEach(followerId => {
                                if (!notifications[followerId]) notifications[followerId] = [];
                                notifications[followerId].push({
                                    type: 'new_photo',
                                    from: userId,
                                    postId: newPost.id,
                                    time: new Date().toISOString()
                                });
                            });
                            localStorage.setItem(STORAGE_KEYS.NOTIFICATIONS, JSON.stringify(notifications));
                        }
                        
                        showNotification('✅ Photo publiée!');
                        resolve(newPost);
                        
                    } catch (e) {
                        posts.pop();
                        showNotification('❌ Espace insuffisant! Supprimez d\'anciennes photos.', 'error');
                        resolve(null);
                    }
                };
                
                reader.readAsDataURL(imageFile);
            });
        }

        function acceptFriendRequest(myId, friendId) {
            const requests = JSON.parse(localStorage.getItem(STORAGE_KEYS.FRIEND_REQUESTS)) || {};
            if (requests[myId]) {
                requests[myId] = requests[myId].filter(id => id !== friendId);
                localStorage.setItem(STORAGE_KEYS.FRIEND_REQUESTS, JSON.stringify(requests));
            }

            const users = getUsers();
            const me = users.find(u => u.id === myId);
            const friend = users.find(u => u.id === friendId);
            
            if (me && friend) {
                if (!me.friends) me.friends = [];
                if (!friend.friends) friend.friends = [];
                
                if (!me.friends.includes(friendId)) me.friends.push(friendId);
                if (!friend.friends.includes(myId)) friend.friends.push(myId);
                
                saveUsers(users);
                if (myId === getCurrentUser().id) setCurrentUser(me);
                
                showNotification(`✅ Vous êtes maintenant ami avec @${friend.username}`);
                return true;
            }
            return false;
        }

        function sendMessage(fromId, toId, text, imageData = null, replyTo = null) {
            const messages = JSON.parse(localStorage.getItem(STORAGE_KEYS.MESSAGES)) || {};
            const chatId = [fromId, toId].sort().join('_');
            
            if (!messages[chatId]) messages[chatId] = [];
            
            const message = {
                from: fromId,
                to: toId,
                text: text,
                image: imageData,
                replyTo: replyTo,
                time: new Date().toISOString()
            };
            
            messages[chatId].push(message);
            localStorage.setItem(STORAGE_KEYS.MESSAGES, JSON.stringify(messages));

            const unread = JSON.parse(localStorage.getItem(STORAGE_KEYS.UNREAD)) || {};
            if (!unread[toId]) unread[toId] = {};
            unread[toId][fromId] = (unread[toId][fromId] || 0) + 1;
            localStorage.setItem(STORAGE_KEYS.UNREAD, JSON.stringify(unread));

            const notifications = JSON.parse(localStorage.getItem(STORAGE_KEYS.NOTIFICATIONS)) || {};
            if (!notifications[toId]) notifications[toId] = [];
            notifications[toId].push({
                type: 'message',
                from: fromId,
                text: text ? (text.substring(0, 30) + (text.length > 30 ? '...' : '')) : '📷 Photo',
                time: new Date().toISOString()
            });
            localStorage.setItem(STORAGE_KEYS.NOTIFICATIONS, JSON.stringify(notifications));
            
            return message;
        }

        // ==================== INSCRIPTION / CONNEXION ====================
        function registerUser(username, email, password, country) {
            const users = getUsers();
            
            if (users.find(u => u.email === email)) {
                showNotification('❌ Email déjà utilisé!', 'error');
                return null;
            }
            if (users.find(u => u.username === username)) {
                showNotification('❌ Nom d\'utilisateur déjà pris!', 'error');
                return null;
            }

            const newUser = {
                id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                username: username,
                email: email,
                password: password,
                country: country,
                bio: '',
                profilePic: username.charAt(0).toUpperCase(),
                coverPic: null,
                followers: [],
                following: [],
                friends: [],
                verified: false,
                isOwner: false,
                createdAt: new Date().toISOString()
            };

            users.push(newUser);
            saveUsers(users);

            const owner = users.find(u => u.isOwner);
            if (owner) {
                newUser.following = [owner.id];
                owner.followers = owner.followers || [];
                owner.followers.push(newUser.id);
                saveUsers(users);
            }

            const groups = getGroups();
            const ownerGroup = groups.find(g => g.isOwnerGroup);
            if (ownerGroup) {
                if (!ownerGroup.members) ownerGroup.members = [];
                ownerGroup.members.push(newUser.id);
                saveGroups(groups);
            }

            const channels = getChannels();
            const ownerChannel = channels.find(c => c.isOwnerChannel);
            if (ownerChannel) {
                if (!ownerChannel.subscribers) ownerChannel.subscribers = [];
                ownerChannel.subscribers.push(newUser.id);
                saveChannels(channels);
            }

            showNotification('✅ Inscription réussie!');
            return newUser;
        }

        function loginUser(email, password) {
            const users = getUsers();
            const user = users.find(u => u.email === email && u.password === password);
            if (user) {
                showNotification(`👋 Bonjour @${user.username}!`);
                return user;
            }
            showNotification('❌ Email ou mot de passe incorrect!', 'error');
            return null;
        }

        // ==================== PAGE CHAT ====================
        let currentChatType = 'private';

        function renderChat(container, user) {
            const users = getUsers();
            const friends = getFriends(user.id);
            const requests = getFriendRequests(user.id);
            const groups = getGroups();
            const channels = getChannels();
            
            let friendsHtml = '';
            friends.forEach(fid => {

                    friendsHtml += `
                        <div class="chat-item" onclick="openPrivateChat('${friend.id}')">

            });
            
            if (!friendsHtml) friendsHtml = '<div style="padding:15px; text-align:center;">Aucun ami pour le moment</div>';
            
            let requestsHtml = '';
            requests.forEach(rid => {

                if (requester) {
                    requestsHtml += `
                        <div class="request-item">

                        </div>
                    `;
                }
            });
            
            if (!requestsHtml) requestsHtml = '<div style="padding:15px; text-align:center;">Aucune demande</div>';
            
            let groupsHtml = '';
            groups.forEach(group => {
                if (group.members.includes(user.id) || group.isOwnerGroup) {
                    const isOwner = group.createdBy === user.id || group.isOwnerGroup;
                    groupsHtml += `
                        <div class="group-item" onclick="openGroupChat('${group.id}')">

            if (!groupsHtml) groupsHtml = '<div style="padding:15px; text-align:center;">Aucun groupe</div>';
            
            let channelsHtml = '';
            channels.forEach(channel => {
                if (channel.subscribers.includes(user.id) || channel.isOwnerChannel) {
                    const isOwner = channel.createdBy === user.id || channel.isOwnerChannel;
                    channelsHtml += `
                        <div class="channel-item" onclick="openChannelChat('${channel.id}')">

            container.innerHTML = `

                    <button class="tab" onclick="switchChatTab('groups')">👥 Groupes</button>
                    <button class="tab" onclick="switchChatTab('channels')">📢 Chaînes</button>

                <div id="chats-tab">${friendsHtml}</div>

                </div>
                <div id="requests-tab" style="display:none;">${requestsHtml}</div>
            `;
        }

        window.openPrivateChat = function(friendId) {
            const friend = getUsers().find(u => u.id === friendId);
            if (!friend) return;
            
            currentChatType = 'private';
            currentChatId = friendId;
            replyingToMessage = null;
            
            const messages = getMessages(getCurrentUser().id, friendId);
            const users = getUsers();
            const currentUser = getCurrentUser();
            
            let html = `
                <div class="chat-window-header">
                    <span class="back-btn" onclick="closeChat()">←</span>
                    <div class="header-info">
                        <h3>@${friend.username}</h3>
                        <small>${friend.bio || ''}</small>
                    </div>
                </div>
                <div class="messages" id="chat-messages">
            `;
            
            messages.forEach(m => {
                const isMe = m.from === currentUser.id;
                const sender = isMe ? currentUser : friend;
                let content = '';
                
                if (m.replyTo) {
                    const repliedUser = users.find(u => u.id === m.replyTo.userId) || { username: '?' };
                    content += `<div class="reply-indicator">↩️ Réponse à @${repliedUser.username}: ${m.replyTo.text.substring(0, 30)}${m.replyTo.text.length > 30 ? '...' : ''}</div>`;
                }
                
                if (m.text) content += m.text;
                if (m.image) content += `<br><img src="${m.image}" class="message-image" onclick="window.open('${m.image}')">`;
                
                html += `
                    <div class="message ${isMe ? 'sent' : 'received'}" data-message-id="${m.time}">
                        ${content}<br>
                        <small>${new Date(m.time).toLocaleTimeString()}</small>
                        <span class="reply-message-btn" onclick="setReplyToMessage('${m.from}', '@${sender.username}', '${m.text ? m.text.replace(/'/g, "\\'") : ''}')">↩️ répondre</span>
                    </div>
                `;
            });
            
            html += '</div>';
            html += `
                <div class="chat-input-area" id="chatInputArea">
                    <input type="text" id="chat-input" placeholder="Message...">
                    <button class="attach-btn" onclick="attachImage()">📷</button>
                    <button onclick="sendChatMessage()">Envoyer</button>
                </div>
            `;
            
            document.getElementById('chatWindow').innerHTML = html;
            document.getElementById('chatWindow').classList.add('active');
            
            setTimeout(() => {
                const msgs = document.getElementById('chat-messages');
                if (msgs) msgs.scrollTop = msgs.scrollHeight;
            }, 100);
        };

        window.openGroupChat = function(groupId) {
            const groups = getGroups();
            const group = groups.find(g => g.id === groupId);
            if (!group) return;
            
            const users = getUsers();
            const user = getCurrentUser();
            
            currentChatType = 'group';
            currentChatId = groupId;
            replyingToMessage = null;
            
            const canWrite = canWriteInGroup(groupId, user.id);
            const isOwner = group.createdBy === user.id || user.isOwner;
            
            let html = `
                <div class="chat-window-header">
                    <span class="back-btn" onclick="closeChat()">←</span>

                    </div>
                    <div class="header-actions">
                        ${isOwner ? `<span onclick="manageGroup('${groupId}')">⚙️</span>` : ''}

                    </div>
                </div>
                <div class="messages" id="chat-messages">
            `;
            
            if (group.messages) {

                    let content = '';
                    
                    if (m.replyTo) {
                        const repliedUser = users.find(u => u.id === m.replyTo.userId) || { username: '?' };
                        content += `<div class="reply-indicator">↩️ Réponse à @${repliedUser.username}: ${m.replyTo.text.substring(0, 30)}${m.replyTo.text.length > 30 ? '...' : ''}</div>`;
                    }
                    
                    if (m.text) content += m.text;
                    
                    html += `
                        <div class="message ${isMe ? 'sent' : 'received'} ${isOwnerMsg && !isMe ? 'owner-message' : ''}" data-message-id="${m.time}">
                            <strong onclick="viewProfile('${m.userId}')">@${sender.username}</strong><br>
                            ${content}<br>
                            <small>${new Date(m.time).toLocaleTimeString()}</small>
                            <span class="reply-message-btn" onclick="setReplyToMessage('${m.userId}', '@${sender.username}', '${m.text ? m.text.replace(/'/g, "\\'") : ''}')">↩️ répondre</span>
                        </div>
                    `;
                });
            }
            
            html += '</div>';
            html += `
                <div class="chat-input-area" id="chatInputArea">
                    <input type="text" id="chat-input" placeholder="Message..." ${!canWrite ? 'disabled' : ''}>
                    <button onclick="sendGroupMessage()" ${!canWrite ? 'disabled' : ''}>Envoyer</button>
                </div>
            `;
            
            document.getElementById('chatWindow').innerHTML = html;
            document.getElementById('chatWindow').classList.add('active');
            
            setTimeout(() => {
                const msgs = document.getElementById('chat-messages');
                if (msgs) msgs.scrollTop = msgs.scrollHeight;
            }, 100);
        };

        window.openChannelChat = function(channelId) {
            const channels = getChannels();
            const channel = channels.find(c => c.id === channelId);
            if (!channel) return;
            
            const users = getUsers();
            const user = getCurrentUser();
            
            currentChatType = 'channel';
            currentChatId = channelId;
            replyingToMessage = null;
            
            const canWrite = canWriteInChannel(channelId, user.id);
            const isOwner = channel.createdBy === user.id || user.isOwner;
            
            let html = `
                <div class="chat-window-header">
                    <span class="back-btn" onclick="closeChat()">←</span>
                    <div class="header-info">
                        <h3>${channel.name}</h3>
                        <small>${channel.subscribers?.length || 0} abonnés</small>
                    </div>
                    <div class="header-actions">
                        ${isOwner ? `<span onclick="manageChannel('${channelId}')">⚙️</span>` : ''}
                        ${channel.subscribers.includes(user.id) && !channel.isOwnerChannel ? `<span onclick="unsubscribeFromChannelChat('${channelId}')">🔕</span>` : ''}
                    </div>
                </div>
                <div class="messages" id="chat-messages">
            `;
            
            if (channel.messages) {
                channel.messages.forEach(m => {
                    const sender = users.find(u => u.id === m.userId) || { username: '?', isOwner: false };
                    const isOwnerMsg = sender.isOwner;
                    let content = '';
                    
                    if (m.replyTo) {
                        const repliedUser = users.find(u => u.id === m.replyTo.userId) || { username: '?' };
                        content += `<div class="reply-indicator">↩️ Réponse à @${repliedUser.username}: ${m.replyTo.text.substring(0, 30)}${m.replyTo.text.length > 30 ? '...' : ''}</div>`;
                    }
                    
                    if (m.text) content += m.text;
                    
                    html += `
                        <div class="message received ${isOwnerMsg ? 'owner-message' : ''}" data-message-id="${m.time}">
                            <strong onclick="viewProfile('${m.userId}')">@${sender.username}</strong><br>
                            ${content}<br>
                            <small>${new Date(m.time).toLocaleTimeString()}</small>
                            <span class="reply-message-btn" onclick="setReplyToMessage('${m.userId}', '@${sender.username}', '${m.text ? m.text.replace(/'/g, "\\'") : ''}')">↩️ répondre</span>
                        </div>
                    `;
                });
            }
            
            html += '</div>';
            html += `
                <div class="chat-input-area" id="chatInputArea">
                    <input type="text" id="chat-input" placeholder="${channel.isOwnerChannel ? 'Annonce...' : 'Message...'}" ${!canWrite ? 'disabled' : ''}>
                    <button onclick="sendChannelMessage()" ${!canWrite ? 'disabled' : ''}>Envoyer</button>
                </div>
            `;
            
            document.getElementById('chatWindow').innerHTML = html;
            document.getElementById('chatWindow').classList.add('active');
            
            setTimeout(() => {
                const msgs = document.getElementById('chat-messages');
                if (msgs) msgs.scrollTop = msgs.scrollHeight;
            }, 100);
        };

        window.setReplyToMessage = function(userId, username, text) {
            replyingToMessage = {
                userId: userId,
                username: username,
                text: text
            };
            
            const inputArea = document.getElementById('chatInputArea');
            if (inputArea) {
                const existingReply = inputArea.querySelector('.reply-indicator');
                if (existingReply) existingReply.remove();
                
                const replyDiv = document.createElement('div');
                replyDiv.className = 'reply-indicator';
                replyDiv.style.cssText = 'flex:1; display:flex; align-items:center; gap:5px; background:#2a2a2a; padding:5px 10px; border-radius:20px;';
                replyDiv.innerHTML = `
                    <span>↩️ Répondre à ${username}</span>
                    <button class="cancel-reply" onclick="cancelReply()" style="background:#ff0050; border:none; color:white; border-radius:50%; width:20px; height:20px; cursor:pointer;">✖</button>
                `;
                
                const input = document.getElementById('chat-input');
                inputArea.insertBefore(replyDiv, inputArea.firstChild);
                
                input.placeholder = 'Votre réponse...';
                input.focus();
            }
        };

        window.cancelReply = function() {
            replyingToMessage = null;
            const replyIndicator = document.querySelector('.reply-indicator');
            if (replyIndicator) replyIndicator.remove();
            document.getElementById('chat-input').placeholder = 'Message...';
        };

        window.closeChat = function() {
            document.getElementById('chatWindow').classList.remove('active');
            replyingToMessage = null;
            renderChat(document.getElementById('mainContent'), getCurrentUser());
        };

        window.attachImage = function() {
            if (currentChatType === 'group' || currentChatType === 'channel') {
                showNotification('❌ Les photos ne sont pas autorisées ici', 'error');
                return;
            }
            
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        window.pendingImage = ev.target.result;
                        showNotification('Image prête à être envoyée');
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        };

        window.sendChatMessage = function() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            const image = window.pendingImage;
            window.pendingImage = null;
            
            let finalText = text;
            if (replyingToMessage) {
                finalText = `@${replyingToMessage.username} ${text}`;
            }
            
            if (!finalText && !image) return;
            
            sendMessage(getCurrentUser().id, currentChatId, finalText, image, replyingToMessage);
            replyingToMessage = null;
            
            cancelReply();
            input.value = '';
            window.pendingImage = null;
            
            openPrivateChat(currentChatId);
        };

        window.sendGroupMessage = function() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            
            let finalText = text;
            if (replyingToMessage) {
                finalText = `@${replyingToMessage.username} ${text}`;
            }
            
            if (!finalText) return;
            
            addGroupMessage(getCurrentUser().id, currentChatId, finalText, null, replyingToMessage);
            replyingToMessage = null;
            
            cancelReply();
            input.value = '';
            
            openGroupChat(currentChatId);
        };

        window.sendChannelMessage = function() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            
            let finalText = text;
            if (replyingToMessage) {
                finalText = `@${replyingToMessage.username} ${text}`;
            }
            
            if (!finalText) return;
            
            addChannelMessage(getCurrentUser().id, currentChatId, finalText, null, replyingToMessage);
            replyingToMessage = null;
            
            cancelReply();
            input.value = '';
            
            openChannelChat(currentChatId);
        };

        window.leaveGroupChat = function(groupId) {
            if (confirm('Quitter ce groupe?')) {
                leaveGroup(getCurrentUser().id, groupId);
                closeChat();
                showPage('chat');
            }
        };

        window.unsubscribeFromChannelChat = function(channelId) {
            unsubscribeFromChannel(getCurrentUser().id, channelId);
            closeChat();
            showPage('chat');
        };

        window.manageGroup = function(groupId) {
            const group = getGroups().find(g => g.id === groupId);
            if (!group) return;
            
            const users = getUsers();
            const admins = getGroupAdmins()[groupId] || [];
            const members = group.members || [];
            const currentUser = getCurrentUser();
            
            let html = `
                <div class="chat-window-header">
                    <span class="back-btn" onclick="closeChat()">←</span>
                    <h3>Gestion du groupe</h3>
                </div>
                <div class="group-management">
                    <h4>Membres (${members.length})</h4>
            `;
            
            members.forEach(mid => {
                const member = users.find(u => u.id === mid);
                if (!member) return;
                const isAdmin = admins.includes(mid);
                const isOwner = group.createdBy === mid;
                
                html += `
                    <div class="member-item">
                        <div class="avatar">${member.profilePic.startsWith('data:') ? `<img src="${member.profilePic}">` : member.profilePic}</div>
                        <div class="member-info">
                            <strong>@${member.username}</strong>
                            <div class="member-role">
                                ${isOwner ? '👑 Propriétaire' : isAdmin ? '⚙️ Admin' : '👤 Membre'}
                            </div>
                        </div>
                        ${!isOwner && group.createdBy === currentUser.id ? `
                            <button class="btn-small" onclick="toggleGroupAdmin('${groupId}', '${mid}')">
                                ${isAdmin ? 'Retirer admin' : 'Nommer admin'}
                            </button>
                        ` : ''}
                    </div>
                `;
            });
            
            html += `
                    <h4 style="margin-top:20px;">Ajouter un ami</h4>
            `;
            
            getFriends(currentUser.id).forEach(fid => {
                const friend = users.find(u => u.id === fid);
                if (!friend || members.includes(fid)) return;
                
                html += `
                    <div class="member-item">
                        <div class="avatar">${friend.profilePic.startsWith('data:') ? `<img src="${friend.profilePic}">` : friend.profilePic}</div>
                        <div class="member-info">
                            <strong>@${friend.username}</strong>
                        </div>
                        <button class="btn-small" onclick="addFriendToGroup('${groupId}', '${fid}')">Ajouter</button>
                    </div>
                `;
            });
            
            html += '</div>';
            
            document.getElementById('chatWindow').innerHTML = html;
            document.getElementById('chatWindow').classList.add('active');
        };

        window.toggleGroupAdmin = function(groupId, userId) {
            const admins = getGroupAdmins();
            if (admins[groupId] && admins[groupId].includes(userId)) {
                removeGroupAdmin(groupId, getCurrentUser().id, userId);
            } else {
                addGroupAdmin(groupId, getCurrentUser().id, userId);
            }
            manageGroup(groupId);
        };

        window.addFriendToGroup = function(groupId, friendId) {
            if (addFriendToGroup(groupId, getCurrentUser().id, friendId)) {
                manageGroup(groupId);
            }
        };

        window.manageChannel = function(channelId) {
            showNotification('Gestion de la chaîne - À venir');
        };

        // ==================== PAGE PROFIL ====================
        function renderProfile(container, user) {
            const posts = getPosts().filter(p => p.userId === user.id);
            const favorites = getFavorites(user.id);
            
            container.innerHTML = `
                <div class="profile-header">
                    <div class="cover-photo">
                        ${user.coverPic ? `<img src="${user.coverPic}">` : ''}
                        <div class="cover-edit" onclick="changeCover()">📷</div>
                    </div>
                    <div class="profile-pic-container">
                        <div class="profile-pic" onclick="changeProfilePic()">
                            ${user.profilePic.startsWith('data:') ? `<img src="${user.profilePic}">` : user.profilePic}
                        </div>
                    </div>
                    <div class="profile-info">
                        <h2>@${user.username} ${user.verified ? '✓' : ''}</h2>
                        <div class="stats">
                            <div onclick="showFollowers()"><strong>${user.followers?.length || 0}</strong><span>Abonnés</span></div>
                            <div onclick="showFollowing()"><strong>${user.following?.length || 0}</strong><span>Abonnements</span></div>
                            <div><strong>${posts.length}/20</strong><span>Photos</span></div>
                            <div><strong>${favorites.length}</strong><span>Favoris</span></div>
                        </div>
                        <div class="bio">
                            <p>${user.bio || '...'}</p>
                            <p>${user.country || ''}</p>
                        </div>
                        <button class="btn" onclick="showEditProfile()">Modifier le profil</button>
                        <button class="btn btn-secondary" onclick="logout()" style="margin-top:10px;">Déconnexion</button>
                         
<button class="btn btn-danger" onclick="forceCleanup()" style="margin-top:10px; background:#ff3333;">
    🧹 FORCER NETTOYAGE (garder 3 photos)
</button>
                    </div>
                </div>
                <div id="editSection" style="display:none;" class="edit-profile-form">
                    <h3>Modifier</h3>
                    <textarea id="editBio" placeholder="Bio">${user.bio || ''}</textarea>
                    <select id="editCountry">
                        <option value="HT">🇭🇹 Ayiti</option>
                        <option value="FR">🇫🇷 France</option>
                        <option value="US">🇺🇸 USA</option>
                        <option value="CA">🇨🇦 Canada</option>
                    </select>
                    <button class="btn" onclick="saveProfile()">Enregistrer</button>
                </div>
                <div class="photo-grid">
                    ${posts.map(p => `
                        <div class="photo-grid-item" onclick="viewPost('${p.id}')">
                            ${p.imageData ? `<img src="${p.imageData}">` : ''}
                            <div class="photo-badge">NOGAME TECH</div>
                            <button class="delete-photo" onclick="deletePhoto('${p.id}'); event.stopPropagation();">✖</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        window.showEditProfile = function() {
            document.getElementById('editSection').style.display = 'block';
        };

        window.saveProfile = function() {
            const user = getCurrentUser();
            const bio = document.getElementById('editBio').value;
            const country = document.getElementById('editCountry').value;
            
            const users = getUsers();
            const idx = users.findIndex(u => u.id === user.id);
            if (idx !== -1) {
                users[idx].bio = bio;
                users[idx].country = country;
                saveUsers(users);
                setCurrentUser(users[idx]);
                showNotification('✅ Profil mis à jour!');
                renderProfile(document.getElementById('mainContent'), users[idx]);
            }
        };

        window.changeProfilePic = function() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        const user = getCurrentUser();
                        const users = getUsers();
                        const idx = users.findIndex(u => u.id === user.id);
                        if (idx !== -1) {
                            users[idx].profilePic = ev.target.result;
                            saveUsers(users);
                            setCurrentUser(users[idx]);
                            showNotification('✅ Photo modifiée!');
                            renderProfile(document.getElementById('mainContent'), users[idx]);
                        }
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        };

        window.changeCover = function() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        const user = getCurrentUser();
                        const users = getUsers();
                        const idx = users.findIndex(u => u.id === user.id);
                        if (idx !== -1) {
                            users[idx].coverPic = ev.target.result;
                            saveUsers(users);
                            setCurrentUser(users[idx]);
                            showNotification('✅ Couverture modifiée!');
                            renderProfile(document.getElementById('mainContent'), users[idx]);
                        }
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        };

        window.deletePhoto = function(postId) {
            if (confirm('Supprimer cette photo?')) {
                deletePost(getCurrentUser().id, postId);
                renderProfile(document.getElementById('mainContent'), getCurrentUser());
            }
        };

window.forceCleanup = function() {
    const user = getCurrentUser();
    const posts = getPosts();
    
    const userPosts = posts.filter(p => p.userId === user.id);
    
    if (userPosts.length <= 3) {
        showNotification('ℹ️ Vous avez moins de 4 photos');
        return;
    }
    
    if (confirm(`⚠️ Garder seulement vos 3 dernières photos? (${userPosts.length - 3} seront supprimées)`)) {
        userPosts.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        const keepIds = userPosts.slice(0, 3).map(p => p.id);
        const newPosts = posts.filter(p => p.userId !== user.id || keepIds.includes(p.id));
        
        savePosts(newPosts);
        showNotification(`✅ ${userPosts.length - 3} photos supprimées!`);
        showPage('profile');
    }
};
        window.showFollowers = () => showNotification('Liste des abonnés');
        window.showFollowing = () => showNotification('Liste des abonnements');
        window.viewPost = () => showNotification('Voir la photo');

        // ==================== PAGE RECHERCHE ====================
        function renderSearch(container, user) {
            container.innerHTML = `
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Rechercher un utilisateur..." onkeyup="doSearch()">
                    <button onclick="clearSearch()">✖</button>
                </div>
                <div id="searchResults"></div>
            `;
        }

        window.doSearch = function() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!query) {
                document.getElementById('searchResults').innerHTML = '';
                return;
            }
            
            const users = getUsers().filter(u => 
                u.username.toLowerCase().includes(query) && 
                u.id !== getCurrentUser().id
            );
            
            let html = '<div style="padding:15px;">';
            users.forEach(u => {
                html += `
                    <div class="chat-item" onclick="viewProfile('${u.id}')">
                        <div class="avatar">
                            ${u.profilePic.startsWith('data:') ? `<img src="${u.profilePic}">` : u.profilePic}
                        </div>
                        <div class="chat-info">
                            <h4>@${u.username} ${u.verified ? '✓' : ''}</h4>
                            <p>${u.bio || ''}</p>
                            <p>📷 ${getPosts().filter(p => p.userId === u.id).length} photos</p>
                        </div>
                        <button class="follow-btn ${isFollowing(getCurrentUser().id, u.id) ? 'following' : ''}" onclick="toggleFollow('${u.id}'); event.stopPropagation();">
                            ${isFollowing(getCurrentUser().id, u.id) ? 'Suivi' : 'Suivre'}
                        </button>
                    </div>
                `;
            });
            html += '</div>';
            
            document.getElementById('searchResults').innerHTML = html || '<div style="padding:15px;">Aucun résultat</div>';
        };

        window.clearSearch = function() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').innerHTML = '';
        };

        // ==================== PAGE UPLOAD ====================
        function renderUpload(container) {
            const user = getCurrentUser();
            const posts = getPosts().filter(p => p.userId === user.id);
            
            container.innerHTML = `
                <div class="upload-area" onclick="selectPhoto()">
                    <div style="font-size:48px;">📷</div>
                    <p>Sélectionner une photo</p>
                    <p style="color:#25D366; margin-top:10px;">${posts.length}/20 photos</p>
                </div>
                <div id="uploadPreview" class="upload-preview"></div>
                <div id="uploadForm" class="upload-form" style="display:none;">
                    <input type="text" id="photoCaption" placeholder="Titre">
                    <textarea id="photoDesc" rows="3" placeholder="Description"></textarea>
                    <input type="text" id="photoTags" placeholder="#hashtags">
                    <button class="btn" onclick="publishPhoto()">Publier</button>
                </div>
            `;
        }

        let selectedPhoto = null;

        window.selectPhoto = function() {
            const user = getCurrentUser();
            const posts = getPosts().filter(p => p.userId === user.id);
            
            if (posts.length >= 20) {
                showNotification('❌ Vous avez déjà 20 photos! Supprimez-en pour en ajouter une nouvelle.', 'error');
                return;
            }
            
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = function(e) {
                selectedPhoto = e.target.files[0];
                if (selectedPhoto) {
                    const preview = document.getElementById('uploadPreview');
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        preview.innerHTML = `<img src="${ev.target.result}" style="width:100%; max-height:300px; object-fit:contain;">`;
                    };
                    reader.readAsDataURL(selectedPhoto);
                    document.getElementById('uploadForm').style.display = 'block';
                }
            };
            input.click();
        };

        window.publishPhoto = async function() {
            if (!selectedPhoto) {
                showNotification('❌ Sélectionnez une photo!', 'error');
                return;
            }
            
            const caption = document.getElementById('photoCaption').value;
            const tags = document.getElementById('photoTags').value;
            
            const result = await addPost(getCurrentUser().id, selectedPhoto, caption, tags);
            if (result) {
                showPage('home');
            }
        };

        // ==================== INIT ====================
        initData();
        render();
    </script>
</body>
</html>
